<svg width="774" height="297" viewBox="0 0 774 297" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <linearGradient id="silver2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="40%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#A16207" />
    </linearGradient>

    <linearGradient id="shieldBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>

    <filter id="textGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>

  <g transform="translate(40, 20) scale(2.4)" filter="url(#shadow)">
    <!-- Base black shield / head -->
    <path d="M 20 25 C 20 25, 60 15, 80 25 C 90 35, 100 55, 95 70 C 85 95, 55 105, 50 110 C 45 105, 15 95, 5 70 C 0 55, 10 35, 20 25 Z" fill="url(#shieldBg)" />

    <!-- Top Hair (Silver) swooping left -->
    <path d="M 15 25 C 25 10, 60 5, 85 20 C 70 15, 45 18, 30 25 C 25 28, 15 25, 15 25 Z" fill="url(#silver1)" />
    <path d="M 0 30 C 15 15, 50 10, 75 25 C 60 20, 35 22, 20 30 C 15 32, 0 30, 0 30 Z" fill="url(#silver2)" />

    <!-- Left Beard & Mustache (Silver) -->
    <path d="M 0 65 C 5 75, 15 90, 35 100 C 35 90, 20 85, 20 75 C 30 75, 45 80, 50 75 C 45 70, 30 65, 15 65 C 10 65, 0 65, 0 65 Z" fill="url(#silver1)" />
    <path d="M 10 50 C 5 55, 0 65, 0 75 C 10 65, 20 60, 30 60 Z" fill="url(#silver2)" />

    <!-- Right Beard & Mustache (Gold) -->
    <path d="M 100 65 C 95 75, 85 90, 65 100 C 65 90, 80 85, 80 75 C 70 75, 55 80, 50 75 C 55 70, 70 65, 85 65 C 90 65, 100 65, 100 65 Z" fill="url(#gold)" />
    <path d="M 90 50 C 95 55, 100 65, 100 75 C 90 65, 80 60, 70 60 Z" fill="url(#gold)" />

    <!-- Scissors (Gold) -->
    <g transform="translate(50, 90) scale(0.6) rotate(45)">
      <!-- Left scissor halfway open -->
      <path d="M -15 -25 L -5 -5 L -8 15 C -15 15, -20 10, -15 0 Z" fill="url(#gold)" />
      <path d="M -13 5 C -13 7, -15 9, -17 7 C -19 5, -17 3, -15 5 Z" fill="#111" />
      
      <!-- Right scissor halfway open -->
      <path d="M 25 -15 L 5 -5 L -15 -8 C -15 -15, -10 -20, 0 -15 Z" fill="url(#gold)" />
      <path d="M -5 -13 C -7 -13, -9 -15, -7 -17 C -5 -19, -3 -17, -5 -15 Z" fill="#111" />
      
      <circle cx="-5" cy="-5" r="2" fill="#111" />
    </g>
  </g>

  <!-- Text: Beardly -->
  <g transform="translate(290, 190)" filter="url(#textGlow)">
    <text x="0" y="0" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="124" letter-spacing="-2">
      <!-- Beardl in Silver -->
      <tspan fill="url(#silver1)" stroke="#334155" stroke-width="1.5">Beardl</tspan>
      <!-- y in Gold -->
      <tspan fill="url(#gold)" stroke="#713F12" stroke-width="1.5">y</tspan>
    </text>
  </g>
</svg>
